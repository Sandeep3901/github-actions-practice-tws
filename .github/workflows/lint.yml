#What is the goal of your workflow
# Goal: Whenever someone changes the python code, the linter will check if syntax, format, indentation (Linting) is correct or not. 

name: Auto Linter

on: 
  push:
    paths: "*.py" 

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      # this step will automatically clone the code of the current branch into the runner.
      - name: Checkout /clone code
        uses: actions/checkout@v7
      # this step will install linter and check the code. 
      - name: Install Linter
        run: pip install ruff
      # this step will run linter. 
      - name: Check the files for linting
        run: ruff check .
        
  
